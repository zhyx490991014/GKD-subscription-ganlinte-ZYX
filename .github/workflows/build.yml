name: build

on: workflow_dispatch  # 手动触发，用于构建和打 tag

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写权限来 push 代码和 tag

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PUSH_TOKEN }}

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - id: version
        run: |
          version=$(bun -e "import('@gkd-kit/tools').then((m) => m.stdoutGkdVersion());")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          bun -e "import('@gkd-kit/tools').then((m) => m.updatePkgVersion());"

      - name: Git commit & Push changes + Tag
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "chore: v${{ steps.version.outputs.version }}" || echo "No changes to commit"
          
          # 推送代码
          git push origin main
          
          # 打 tag 并推送（触发 publish workflow）
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}